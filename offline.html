<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="noindex, nofollow" />
        <meta name="theme-color" content="#f7f5ef" />
        <title>Offline - Saw Ye Htet</title>
        <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png" />
        <style>
            @font-face {
                font-family: 'Adwaita Sans';
                src: url('/fonts/AdwaitaSans-Regular.subset.woff2') format('woff2');
                font-display: swap;
                font-weight: 400 800;
                font-style: normal;
            }
            @font-face {
                font-family: 'Adwaita Mono';
                src: url('/fonts/AdwaitaMono-Regular.subset.woff2') format('woff2');
                font-display: swap;
                font-weight: 400;
                font-style: normal;
            }
            :root {
                --paper: #f7f5ef;
                --ink: #161410;
                --ink-3: #6d685b;
                --line: #d8d3c6;
                --accent: #cc2a10;
                --sans: 'Adwaita Sans', 'Inter', system-ui, sans-serif;
                --mono: 'Adwaita Mono', 'SF Mono', ui-monospace, monospace;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: var(--sans);
                background: var(--paper);
                color: var(--ink);
                min-height: 100dvh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                -webkit-font-smoothing: antialiased;
            }
            .offline {
                width: 100%;
                max-width: 460px;
            }
            .offline-eyebrow {
                font-family: var(--mono);
                font-size: 0.66rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--accent);
            }
            h1 {
                margin: 8px 0 0;
                font-size: clamp(2.2rem, 7vw, 3.2rem);
                font-weight: 800;
                letter-spacing: -0.03em;
                line-height: 0.95;
            }
            h1 .dot {
                color: var(--accent);
            }
            p {
                max-width: 42ch;
                margin-top: 20px;
                padding-top: 20px;
                border-top: 1px solid var(--line);
                font-size: 1.05rem;
                line-height: 1.6;
            }
            .retry {
                display: inline-block;
                margin-top: 28px;
                font-family: var(--mono);
                font-size: 0.78rem;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                color: var(--ink);
                text-decoration: none;
                border-bottom: 1px solid var(--accent);
                padding-bottom: 2px;
            }
        </style>
    </head>
    <body>
        <main class="offline">
            <span class="offline-eyebrow">No connection</span>
            <h1>Offline<span class="dot">.</span></h1>
            <p>
                This page will reconnect when your network is back. The résumé, projects, and
                contact details are all on the main site once you are online again.
            </p>
            <a class="retry" href="/">Try again &rarr;</a>
        </main>
    </body>
</html>
