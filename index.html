        <!-- Fonts fully self-hosted (Adwaita Sans/Mono in /fonts). No external font requests. -->

        <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" sizes="180x180" />

        <!-- Profile photo: shown when the About/Contact apps open, not on the
             initial desktop. Prefetch (not preload) warms the cache at low
             priority so it's instant on open, without a wasted-preload warning
             or competing with the critical font/JS for initial paint. -->
        <link rel="prefetch" href="/images/profile-picture.webp" as="image" type="image/webp" />
        <link
            rel="preload"
            href="/fonts/AdwaitaSans-Regular.subset.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <!-- Adwaita Mono is above the fold too (nav links, eyebrows, spec keys),
             so preload it alongside Sans to avoid a late swap. -->
        <link
            rel="preload"
            href="/fonts/AdwaitaMono-Regular.subset.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />

        <!-- Skip-link styles -->
        <style>
            .skip-link {
                position: absolute;
                top: -100%;
                left: 0;
                z-index: 10000;
                padding: 12px 24px;
                background: #161410;
                color: #fff;
                font-family: system-ui, sans-serif;
                font-size: 14px;
                font-weight: 700;
                text-decoration: none;
                border-radius: 0 0 2px 0;
                transition: top 0.2s ease;
            }
            .skip-link:focus {
                top: 0;
            }
        </style>

                    "https://x.com/saulyehtet_"
